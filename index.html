<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>טלפון שבור</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#FFD54F;
    text-align:center;
    color:#111;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

.instructions{
    background:white;
    padding:20px;
    border-radius:20px;
    max-width:800px;
    margin:auto;
    line-height:1.7;
    font-size:20px;
}

.sentence{
    background:white;
    padding:30px;
    margin:25px auto;
    border-radius:20px;
    max-width:700px;
    font-size:42px;
    font-weight:bold;
    border:4px solid #111;
}

.timer{
    font-size:72px;
    font-weight:bold;
    margin:25px 0;
}

button{
    font-size:24px;
    padding:15px 30px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    margin:10px;
}

.startBtn{
    background:#4CAF50;
    color:white;
}

.stopBtn{
    background:#F44336;
    color:white;
}

.result{
    font-size:36px;
    font-weight:bold;
    margin-top:20px;
}

@media(max-width:600px){

h1{
    font-size:34px;
}

.sentence{
    font-size:28px;
}

.timer{
    font-size:54px;
}

.instructions{
    font-size:18px;
}

button{
    font-size:20px;
}

}

</style>
</head>

<body>

<h1>📢 טלפון שבור</h1>

<div class="instructions">

המשתתף הראשון קורא את המשפט הסודי.<br>
העבירו את המשפט בלחישה מאחד לשני לאורך כל השורה.<br>
אסור לחזור על הלחישה פעמיים ואסור לבקש חזרה.<br>
המשתתף האחרון אומר בקול את המשפט ששמע.<br><br>

🏆 הקבוצה המהירה והמדויקת ביותר מנצחת!

</div>

<div class="sentence" id="sentenceBox"></div>

<div class="timer" id="timer">
00:00
</div>

<button class="startBtn" onclick="startTimer()">
▶ התחל
</button>

<button class="stopBtn" onclick="stopTimer()">
⏹ עצור
</button>

<div class="result" id="result"></div>

<script>

const sentences = [

"הפיל אכל פיצה בתוך האוטובוס",
"סבתא רקדה סלסה עם גמל",
"התרנגולת קנתה גלידה בתחנת רכבת",
"הדולפין שר שירים במקלחת ציבורית",
"הכריש הזמין סלט בלי חסה",
"הקוף מצא ארנק בתוך המקרר",
"הכלב רכב אופניים בגשם שוטף",
"האריה שיחק טניס עם פינגווין",
"הרובוט שטף כלים עם שוקולד",
"הברווז צבע קירות בצבע סגול",
"הפיצה ברחה מהמסעדה בלילה",
"הצב ניצח מירוץ נגד אופנוע",
"התוכי אכל אבטיח על הירח",
"הקרנף כתב שיר על מלפפון",
"החתול בנה ארמון מקרטוני חלב",
"הגמל למד שחייה בבריכה ביתית",
"הפיל התחפש לעכבר במסיבה גדולה",
"האסטרונאוט חיפש גרב בתוך תנור",
"הטבח הכין פלאפל משוקולד לבן",
"הדג ניגן בגיטרה על הסירה",
"הפינגווין מכר גרעינים בתחנת דלק",
"הסוס קפץ לבריכה עם מטרייה",
"הינשוף אכל פופקורן באמצע שיעור",
"העכבר שיחק כדורסל עם כריש",
"הברווז קנה מחשב בלי מקלדת"

];

const randomSentence =
sentences[Math.floor(Math.random()*sentences.length)];

document.getElementById("sentenceBox").innerHTML =
randomSentence;

let seconds = 0;
let timer;

function startTimer(){

clearInterval(timer);

seconds = 0;

document.getElementById("result").innerHTML = "";

timer = setInterval(function(){

seconds++;

let minutes = Math.floor(seconds/60);
let secs = seconds%60;

document.getElementById("timer").innerHTML =
String(minutes).padStart(2,"0") + ":" +
String(secs).padStart(2,"0");

},1000);

}

function stopTimer(){

clearInterval(timer);

document.getElementById("result").innerHTML =
"⏱ זמן הקבוצה: " +
document.getElementById("timer").innerHTML;

}

</script>

</body>
</html>
